<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Analyzer</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }
        textarea{
            width: 60%;
            height: 150px;
            padding: 10px;
        }
        button{
            margin-top: 10px;
            padding: 10px 15px;
        }
        #result{
            margin-top: 20px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            padding: 15px;
            background-color: lightblue;
            border: 2px solid black;
        }
    </style>
</head>

<body>

<h2>Text Analyzer</h2>

<textarea id="textInput" placeholder="Enter your text here..."></textarea><br>
<button id="analyzeBtn">Analyze Text</button>

<div id="result"></div>
<script>
    var btn = document.getElementById("analyzeBtn");

    btn.addEventListener("click", function(){
        var text = document.getElementById("textInput").value.trim();

        if(text === ""){
            document.getElementById("result").innerHTML = "Please enter some text.";
            return;
        }    
        var charCount = text.length;

        var words = text.split(/\s+/);
        var wordCount = words.length;

        var reversed = text.split("").reverse().join("");

        document.getElementById("result").innerHTML =
            "Characters: " + charCount + "<br>" +
            "Words: " + wordCount + "<br>" +
            "Reversed Text: " + reversed;
    });
</script>

</body>
</html>
